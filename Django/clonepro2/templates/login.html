{% load static %}

<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta http-eqive="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <title>Login form</title>
    <!-- custom css link -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <!-- google font cdn link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

  </head>
  <body>
    
    <section class="wrapper">
        <div class="container">
            <div class="col-sm-8 offset-sm-2 col-lg-6 offset-lg-3 col-xl-4 offset-xl-4 text-center">
                <div class="logo">
                    <img src="{% static 'img/logo.png' %}" class="img-fluid" alt="logo">
                </div>
                <form class="rounded bg-white shadow p-5" method='post' action='{% url 'index' %}'> 
                    {% csrf_token %}
                    <h3 class="text-dark fw-bolder fs-4 mb-2"> Sign In PBH Bank</h3>
                    <div class="fw-normal text-muted mb-4">
                        New Here? <a href="{% url 'signup' %}" class="text-primary fw-blod text-decoration-none"> Create an Account </a>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="email_input" placeholder="name@example.com" name="email_input">
                        <label for="email_input">Email address</label>
                    </div>                    
                    <div class="form-floating">
                        <input type="password" class="form-control" id="password_input" placeholder="Password" id="password_input">
                        <label for="password_input">Password</label>
                    </div>
                    <div class="mt-2 text-end">
                        <a href="{% url 'forget' %}" class="text-primary fw-blod text-decoration-none"> Forget Password? </a>
                    </div>
                    <button type="submit" class="btn btn-primary submit_btn w-100 my-4"> Continue </button>
                    <div class="text-center text-muted text-uppercase mb-3"> or </div>
                    <a href="{% url 'social:begin' 'google-oauth2' %}" class="btn btn-light login_with w-100 mb-3">
                        <img src="{% static 'img/google-icon.svg' %}" class="img-fluid me-3"> Continue with Google
                    </a>
                    <a href="{% url 'social:begin' 'facebook' %}" class="btn btn-light login_with w-100 mb-3">
                        <img src="{% static 'img/facebook-icon.svg' %}" class="img-fluid me-3"> Continue with Facebook
                    </a>
                    <a href="{% url 'social:begin' 'linkedin-oauth2' %}" class="btn btn-light login_with w-100 mb-3">
                        <img src="{% static 'img/linkedin-icon.svg' %}" class="img-fluid me-3"> Continue with LinkedIn
                    </a>
                    
                </form>
            </div>
        </div>
    </section>

    <!-- Optional JavaScript; choose one of the two! -->

    <!-- Option 1: Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

    <!-- Option 2: Separate Popper and Bootstrap JS -->
    <!--
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
    -->
  </body>
</html>
