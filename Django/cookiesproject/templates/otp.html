<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OTP Verification</title>
  <!-- Bootstrap CSS -->
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container-fluid bg-light min-vh-100 d-flex align-items-center justify-content-center">
  <div class="card p-4">
    <h2 class="text-center mb-4">OTP Verification</h2>
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label for="otp">Enter OTP</label>
        <input type="text" name="otp" id="otp" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Verify OTP</button>
      <a href="{% url 'forget' %}" class="text-muted mt-2 d-block text-center">Resend OTP</a>
    </form>
  </div>
</div>

<!-- Bootstrap JS (optional) -->
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
