<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <!-- Bootstrap CSS -->
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container-fluid bg-light min-vh-100 d-flex align-items-center justify-content-center">
  <div class="card p-4">
    <h2 class="text-center mb-4">Login</h2>
    <form method="post" action="{% url 'welcome' %}">
      {% csrf_token %}
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" name="username" id="username" class="form-control" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" name="password" id="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Login</button>
      <!--<a href="{% url 'welcome' %}" class="btn btn-outline-primary btn-block " >Login</a>  -->
      <a href="{% url 'sign' %}" class="text-muted mt-2 d-block text-center">New_user</a>
      <a href="{% url 'forget' %}" class="text-muted mt-2 d-block text-center">Forgot Password?</a>
    </form>
  </div>
</div>

<!-- Bootstrap JS (optional) -->
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
