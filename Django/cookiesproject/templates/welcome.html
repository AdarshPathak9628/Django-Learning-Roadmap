<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome</title>
  <!-- Bootstrap CSS -->
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container-fluid bg-light min-vh-100 d-flex align-items-center justify-content-center">
  <div class="card p-4 rounded-lg border-0 shadow">
    <h2 class="text-center mb-4 text-primary">Welcome, {{un}}</h2>
    <p class="text-center text-muted mb-5">You have successfully logged in. Enjoy your stay!</p>
    <div class="text-center">
      <a href="{% url 'profile' %}" class="btn btn-outline-primary mr-3">Profile</a>
      <a href="{% url 'logout' %}" class="btn btn-primary btn-lg">Logout</a>
    </div>
  </div>
</div>

<!-- Bootstrap JS (optional) -->
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
