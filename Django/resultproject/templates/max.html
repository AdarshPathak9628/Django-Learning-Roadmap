<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Result</title>
  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <style>
    /* Additional custom CSS can be added here */
  </style>
</head>
<body>
  <div class="container">
    <div class="row">
      <div class="col-md-12 mt-5">
        <h2 class="text-center">Result</h2>
      </div>
    </div>
    <div class="row">
      <div class="col-md-12">
        <table class="table table-bordered">
          <thead class="thead-dark">
            <tr>
              <th>Subject</th>
              <th>Unit Test 1</th>
              <th>Half Year</th>
              <th>Unit Test 2</th>
              <th>Final Year</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Maths</td>
              <td>90</td>
              <td>85</td>
              <td>95</td>
              <td>88</td>
            </tr>
            <tr>
              <td>English</td>
              <td>85</td>
              <td>82</td>
              <td>88</td>
              <td>86</td>
            </tr>
            <tr>
              <td>Hindi</td>
              <td>88</td>
              <td>84</td>
              <td>90</td>
              <td>87</td>
            </tr>
            <tr>
              <td>Chemistry</td>
              <td>92</td>
              <td>89</td>
              <td>94</td>
              <td>91</td>
            </tr>
            <tr>
              <td>Physics</td>
              <td>87</td>
              <td>85</td>
              <td>90</td>
              <td>88</td>
            </tr>
            <!-- Add more subjects here -->
          </tbody>
        </table>
      </div>
    </div>
    <div class="row">
      <div class="col-md-12">
        <div class="form-group">
          <label for="subjectSelect">Choose Subject:</label>
          <select class="form-control" id="subjectSelect">
            <option value="Maths">Maths</option>
            <option value="English">English</option>
            <option value="Hindi">Hindi</option>
            <option value="Chemistry">Chemistry</option>
            <option value="Physics">Physics</option>
            <!-- Add more subjects here -->
          </select>
        </div>
        <button type="button" class="btn btn-primary" id="maxBtn">Max</button>
        <button type="button" class="btn btn-primary" id="minBtn">Min</button>
        <button type="button" class="btn btn-primary" id="avgBtn">Average</button>
        <p id="result"></p>
      </div>
    </div>
  </div>
  <!-- Bootstrap JS and dependencies -->
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
  <script>
    $(document).ready(function() {
      $('#maxBtn').click(function() {
        var subject = $('#subjectSelect').val();
        var maxMark = $('td:contains(' + subject + ')').siblings().map(function() {
          return parseInt($(this).text()) || 0;
        }).get().reduce(function(a, b) {
          return Math.max(a, b);
        });
        $('#result').text('Maximum marks in ' + subject + ': ' + maxMark);
      });

      $('#minBtn').click(function() {
        var subject = $('#subjectSelect').val();
        var minMark = $('td:contains(' + subject + ')').siblings().map(function() {
          return parseInt($(this).text()) || 0;
        }).get().reduce(function(a, b) {
          return Math.min(a, b);
        });
        $('#result').text('Minimum marks in ' + subject + ': ' + minMark);
      });

      $('#avgBtn').click(function() {
        var subject = $('#subjectSelect').val();
        var marks = $('td:contains(' + subject + ')').siblings().map(function() {
          return parseInt($(this).text()) || 0;
        }).get();
        var avgMark = marks.reduce(function(a, b) {
          return a + b;
        }, 0) / marks.length;
        $('#result').text('Average marks in ' + subject + ': ' + avgMark.toFixed(2));
      });
    });
  </script>
</body>
</html>
