<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css">

  <title>Hello, world!</title>  
</head>
<body>
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card shadow-lg">
          <div class="card-body">
            <div class="col text-light bg-dark text-center">
              <h2> Edit Student Details </h2>
            </div>
            <form action="#" method="post" enctype="multipart/form-data">
              {% csrf_token %}
              
              <div class="form-group">
                <input type="text" class="form-control" name="name" placeholder="Enter your name" value="{{all.name}}">
              </div>
              <div class="form-group">
                <input type="email" class="form-control" name="email" placeholder="Enter your email" value="{{all.email}}">
              </div>
              <div class="form-group">
                <input type="text" class="form-control" name="age" placeholder="Enter your age" value="{{all.age}}">
              </div>
              <div class="form-group">
                <input type="text" class="form-control" name="gender" placeholder="Gender" value="{{all.gender}}">
              </div>
              <div class="form-group">
                <input type="text" class="form-control" name="qualification" placeholder="Qualification" value="{{all.qualification}}">
              </div>
              {% if all.img.url %}
              <div class="custom-file mb-3">
                <input type="file" class="custom-file-input" id="img" name="img" value="{{all.img.url}}">
                <label class="custom-file-label" for="img">Choose an image...</label>
              </div>
              {% else %}
              <div class="custom-file mb-3">
                <input type="file" class="custom-file-input" id="img" name="img" value="{{all.img.url}}">
                <label class="custom-file-label" for="img">Choose an image...</label>
              </div>
              {% endif %}
              <button type="submit" class="btn btn-dark btn-block">Submit</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Optional JavaScript -->
  <!-- jQuery first, then Popper.js, then Bootstrap JS -->
  <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js"></script>
</body>
</html>
