{% load static %}


<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="{% static 'css/bootstrap.css' %}" rel="stylesheet">
   <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">-->  

    <title>Hello, world!</title>
  </head>
  <body>
    <div class="container-fluid">
        <div class="row bg-dark text-center">
            <div class="col text-light">
                <h1> MINI PROJECT </h1>
            </div>   
        </div>
    </div>

    <div class="container">
        <div class="row mt-4">
            <div class="col-sm-2 col-md-3 offset-0.5">
                <form action="#" method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="col text-light bg-dark text-center">
                        <h2> Add New Student </h2>
                    </div>
                    <div class="mb-3">
                        <input type="text" class="form-control" id="name" name="name" placeholder="Enter the name">                      
                    </div> 
                    <div class="mb-3">
                      <input type="email" class="form-control" id="email" name="email" aria-describedby="emailHelp" placeholder="enter the email">
                    </div>
                    <div class="mb-3">
                      <input type="text" class="form-control" id="age" name="age" placeholder="Enter the age">
                    </div>
                    <div class="mb-3">
                        <input type="text" class="form-control" id="gender" name="gender" placeholder="Enter the gender">
                    </div>
                    <div class="mb-3">
                        <input type="text" class="form-control" id="qualification" name="qualification" placeholder="Enter the qualification">
                    </div>
                    <div class="mb-3">
                        <input type="file" class="form-control" id="img" name="img">
                    </div>
                    <div class="mb-3 form-check">
                      <input type="checkbox" class="form-check-input" id="exampleCheck1" placeholder="Enter the name">
                      <label class="form-check-label" for="exampleCheck1">Check me out</label>
                    </div>
                    <div class="d-grid gap-2 col-12 mx-auto">
                      <button class="btn btn-dark" type="submit" value="upload">Upload</button>
                    </div>
                </form>
            </div>

            <div class="col-sm-4 col-md-8 offset-0.5 mx-auto"> 
              <div class=" text-light bg-dark text-center" style="width:785px;">
                <h2 > Student Details</h2>
              </div>
              <table class="table">
                <thead class="table-dark">
                  <tr>
                    <th scope="col">ID</th>
                    <th scope="col">Name</th>
                    <th scope="col">Email</th>
                    <th scope="col">Age</th>
                    <th scope="col">Gender</th>
                    <th scope="col">Qualification</th>
                    <th scope="col">Photo</th>
                    <th scope="col">Edit</th>
                    <th scope="col">Delete</th>
                  </tr>
                </thead>
                <tbody>
                  {% for i  in all  %}
                  <tr>
                    <th scope="row">{{i.id}}</th>
                    <td>{{i.name}}</td>
                    <td>{{i.email}}</td>
                    <td>{{i.age}}</td>
                    <th>{{i.gender}} </th>
                    <td>{{i.qualification}}</td>
                    <td><img src="{{i.img.url}}"  height="50" width="40"></td>
                    <td><a href="{% url 'edit' i.id%}" class="btn btn-outline-success" role="button" data-bs-toggle="button">Edit</a></td>
                    <td><a href="{% url 'delete' i.id%}" class="btn btn-danger active" role="button" data-bs-toggle="button" aria-pressed="true">Delete</a></td>
                  </tr>
                  {% endfor %}
                </tbody>
              </table>         
            </div>
        </div>
    </div>

    <!-- Option 1: Bootstrap Bundle with Popper -->
    <script src="{% static 'js/bootstrap.bundle.js' %}" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script> 
  </body>
</html>
