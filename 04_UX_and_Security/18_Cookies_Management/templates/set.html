<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Set Cookies</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h3 class="card-title mb-0">Set Cookie Data</h3>
                    </div>
                    <div class="card-body">
                        <form method="POST">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label for="uname" class="form-label">Username:</label>
                                <input type="text" name="uname" id="uname" class="form-control" placeholder="Enter username" required>
                            </div>
                            <div class="mb-3">
                                <label for="color" class="form-label">Background Color:</label>
                                <input type="text" name="color" id="color" class="form-control" placeholder="e.g., red, blue, #ff0000" required>
                            </div>
                            <button type="submit" class="btn btn-success">Set Cookies</button>
                        </form>
                    </div>
                </div>

                <div class="mt-4">
                    <a href="{% url 'get' %}" class="btn btn-info">View Cookies</a>
                    <a href="{% url 'go' %}" class="btn btn-secondary ms-2">Get Operation</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
