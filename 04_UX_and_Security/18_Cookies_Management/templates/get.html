<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Get Cookies</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: {{ col }};">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-success text-white">
                        <h3 class="card-title mb-0">Cookie Data Retrieved</h3>
                    </div>
                    <div class="card-body">
                        <div class="alert alert-info">
                            <h5>Simple Cookie:</h5>
                            <p><strong>User:</strong> {{ cn }}</p>
                        </div>

                        <div class="alert alert-warning">
                            <h5>Operation Cookies:</h5>
                            <p><strong>Username:</strong> {{ un }}</p>
                            <p><strong>Background Color:</strong> {{ col }}</p>
                        </div>
                    </div>
                </div>

                <div class="mt-4">
                    <a href="{% url 'set' %}" class="btn btn-primary">Set Cookies</a>
                    <a href="{% url 'so' %}" class="btn btn-secondary ms-2">Set Operation</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
