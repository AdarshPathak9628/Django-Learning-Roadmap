<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <title>Hello, world!</title>
  </head>
  <script>
    function addvalue(){
      let result="";
      let checkboxs=document.getElementsByName("qualification");
    for(var i=0;i<checkbox.length;i++)
    {
      if(checkboxs[i].checked==true)
      {
        result+=checkboxs[i].value+",";
      }
    }
    fr=result.substring(0,result.length-1);
    res.value=fr;
    }
  <body>
    <div class="container">
      <div class="row gx-5">
        <div class="col-6">
          <form action="#" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-3">
              <label for="exampleInputEmail1" class="form-label">Email address</label>
              <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" name="email">
              <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
            </div>
            <div class="mb-3">
              <label for="exampleInputPassword1" class="form-label">Password</label>
              <input type="password" class="form-control" id="exampleInputPassword1" name="password">
            </div>
            <div class="mb-3">
                <label for="img" class="form-label"> Add Images </label>
                <input type="file" name='image' class="form-control" id="image">
            </div>
            <div class="mb-3 form-check">
              <input type="checkbox" class="form-check-input" id="exampleCheck1" name="qualification" id="qualification" value="10th" onclick="addvalue()">
              <label class="form-check-label" for="exampleCheck1">10th</label>
            </div>
            <div class="mb-3 form-check">
              <input type="checkbox" class="form-check-input" id="exampleCheck1" name="qualification" id="qualification" value="12th" onclick="addvalue()">
                <label class="form-check-label" for="exampleCheck1"> 12th </label>
              </div>
             <div class="mb-3 form-check">
              <input type="checkbox" class="form-check-input" id="exampleCheck1" name="qualification" id="qualification" value="ug" onclick="addvalue()">
                <label class="form-check-label" for="exampleCheck1"> ug </label>
            </div>
            <div class="mb-3 form-check">
              <input type="checkbox" class="form-check-input" id="exampleCheck1" name="qualification" id="qualification" value="pg" onclick="addvalue()">
                <label class="form-check-label" for="exampleCheck1"> pg </label>
            </div> 
            <input type="textbox" name="res" id="res">  
            <button type="submit" class="btn btn-primary"> Submit </button>
          </form>
        </div>
      </div>
    </div>
    <table class="table">
      <thead class="thead-light">
        <th scope="col">ID</th>
        <th scope="col">EMAIL</th>
        <th scope="col">PASSWORD</th>
        <th scope="col">IMAGES</th>
        <th scope="col">qualification</th>
        <th scope="col"> EDIT </th>   
      </thead>
      <tbody>
        {% for i in im %}
        <tr>
          <th scope="col">{{i.id}}</th>
          <th scope="col">{{i.email}}</th>
          <th scope="col">{{i.password}}</th>
          <th scope="col">{{i.qualification}}</th>
          <th scope="col"><img src="{{i.image.url}}" height='100' width='150'></th>
          <th scope="col"><a href="{% url 'edit' i.id %}" class="btn btn-primary btn-lg active" role="button" aria-pressed="true"> Edit </a></th>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    
    

    <!-- Optional JavaScript; choose one of the two! -->

    <!-- Option 1: Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

    <!-- Option 2: Separate Popper and Bootstrap JS -->
    <!--
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
    -->
  </body>
</html>
