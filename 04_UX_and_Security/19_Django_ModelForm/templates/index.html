<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Student Registration</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container mt-5">
      <div class="row">
        <div class="col-md-6">
          <div class="card">
            <div class="card-header bg-primary text-white">
              <h3 class="card-title mb-0">Add New Student</h3>
            </div>
            <div class="card-body">
              <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                  <label for="{{ fm.name.id_for_label }}" class="form-label"
                    >Name:</label
                  >
                  {{ fm.name }}
                </div>
                <div class="mb-3">
                  <label for="{{ fm.phone.id_for_label }}" class="form-label"
                    >Phone:</label
                  >
                  {{ fm.phone }}
                </div>
                <button type="submit" class="btn btn-success">
                  Add Student
                </button>
              </form>
            </div>
          </div>
        </div>

        <div class="col-md-6">
          <div class="card">
            <div class="card-header bg-success text-white">
              <h3 class="card-title mb-0">
                Registered Students ({{ students|length }})
              </h3>
            </div>
            <div class="card-body">
              {% if students %}
              <div class="list-group">
                {% for student in students %}
                <div class="list-group-item">
                  <div class="d-flex w-100 justify-content-between">
                    <h5 class="mb-1">{{ student.name }}</h5>
                    <small class="text-muted">{{ student.phone }}</small>
                  </div>
                </div>
                {% endfor %}
              </div>
              {% else %}
              <p class="text-muted">No students registered yet.</p>
              {% endif %}
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
