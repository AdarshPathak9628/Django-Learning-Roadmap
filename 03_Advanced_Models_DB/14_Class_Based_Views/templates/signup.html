{% extends "index.html" %} {% block blog %}
<div class="container mt-5 pb-5">
  <div class="row justify-content-center">
    <div
      class="col-md-6 card bg-dark p-4 shadow-lg"
      style="border: 1px solid #ffde59"
    >
      <h2 class="text-center mb-4" style="color: #ffde59">Create Account</h2>

      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <input
            type="text"
            name="username"
            class="form-control"
            placeholder="Username"
            required
          />
        </div>
        <div class="form-group">
          <input
            type="email"
            name="email"
            class="form-control"
            placeholder="Email"
            required
          />
        </div>
        <div class="form-group">
          <input
            type="password"
            name="password"
            class="form-control"
            placeholder="Password"
            required
          />
        </div>
        <div class="form-group">
          <input
            type="number"
            name="phone"
            class="form-control"
            placeholder="Phone Number"
            required
          />
        </div>
        <div class="form-group">
          <input
            type="text"
            name="address"
            class="form-control"
            placeholder="Address"
            required
          />
        </div>

        <div class="form-group">
          <label class="text-warning">Date of Birth</label>
          <input type="date" name="dob" class="form-control" required />
        </div>

        <div class="form-group">
          <input
            type="text"
            name="occupation"
            class="form-control"
            placeholder="Occupation"
            required
          />
        </div>

        <div class="form-group">
          <input
            type="text"
            name="country"
            class="form-control"
            placeholder="Country"
            required
          />
        </div>

        <button type="submit" class="btn btn-lg btn-custom btn-block">
          Sign Up Now
        </button>
      </form>

      <p class="mt-4 text-center">
        Already have an account?
        <a href="{% url 'login' %}" class="text-info">Login here</a>.
      </p>
    </div>
  </div>
</div>
{% endblock blog %}
