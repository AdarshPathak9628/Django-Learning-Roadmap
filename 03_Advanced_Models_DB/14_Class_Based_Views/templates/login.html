{% extends "index.html" %} {% block blog %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div
      class="col-md-5 card bg-dark p-5 shadow-lg"
      style="border: 1px solid #ffde59"
    >
      <h2 class="text-center mb-4" style="color: #ffde59">Welcome Back</h2>

      {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <input
            type="text"
            name="username"
            class="form-control"
            placeholder="Username"
            required
          />
        </div>
        <div class="form-group">
          <input
            type="password"
            name="password"
            class="form-control"
            placeholder="Password"
            required
          />
        </div>
        <button type="submit" class="btn btn-lg btn-custom btn-block">
          Login
        </button>
      </form>

      <p class="mt-4 text-center">
        Don't have an account?
        <a href="{% url 'signup' %}" class="text-info">Sign up here</a>.
      </p>
    </div>
  </div>
</div>
{% endblock blog %}
