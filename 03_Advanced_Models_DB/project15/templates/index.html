<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #000000, #333333); 
      color: #ffffff; 
    }
    .container {
      margin-top: 100px;
    }
    .btn-custom {
      background-color: #f8b500;  
      border-color: #f8b500;
      color: #fff; 
      transition: background-color 0.3s; 
    }
    .btn-custom:hover {
      background-color: #f19f4d; 
      border-color: #f19f4d;
    }
    .link {
      color: #6c757d; 
    }
    .link:hover {
      color: #495057; 
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 text-center">
        <h2 class="mb-4">Welcome</h2>
        <p>Login or Sign Up to continue</p>
        <a href="{% url 'login' %}" class="btn btn-lg btn-custom mr-3">Login</a>
        <a href="{% url 'signup' %}" class="btn btn-lg btn-secondary ml-3">Sign Up</a>
        <p class="mt-4">Don't have an account? <a href="{% url 'signup' %}" class="link">Sign up here</a>.</p>
      </div>
    </div>
  </div>
  
  {% block blog %}
  
  
  
  {% endblock blog %}

  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
