{% extends "index.html" %}


{% block blog %} 
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #000000, #383838); 
      color: #ffffff; 
    }
    .container {
      margin-top: 100px;
    }
    .btn-custom {
      background-color: #ffde59;
      border-color: #ffde59;
      color: #333; 
      transition: background-color 0.3s;
    }
    .btn-custom:hover {
      background-color: #ffd166;
      border-color: #ffd166;
    }
    .link {
      color: #ffffff; 
    }
    .link:hover {
      color: #f5cac3; 
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 text-center">
        <h2 class="mb-4">Sign Up</h2>
        <form method='post'> 
           {% csrf_token %} 
          <div class="form-group">
            <input type="text" name="username" class="form-control" placeholder="Username" required>
          </div>
          <div class="form-group">
            <input type="email" name="email" class="form-control" placeholder="Email" required>
          </div>
          <div class="form-group">
            <input type="password" name="password" class="form-control" placeholder="Password" required>
          </div>
          <div class="form-group">
            <input type="tel" name="phone" class="form-control" placeholder="Phone Number (Max 6 digits)" maxlength="6" required>
          </div>
          <div class="form-group">
            <input type="text" name="address" class="form-control" placeholder="Address" required>
          </div>
          <div class="form-group">
            <input type="date" name="dob" class="form-control" placeholder="Date of Birth" required>
          </div>
          <div class="form-group">
            <input type="text" name="occupation" class="form-control" placeholder="Occupation" required>
          </div>
          <div class="form-group">
            <input type="text" name="country" class="form-control" placeholder="Country" required>
          </div>
          <button type="submit" class="btn btn-lg btn-custom mr-3"><a href="{% url "login" %}">Sign Up </a></button>
        </form>
        <p class="mt-4">Already have an account? <a href="{% url 'login' %}" class="link">Login here</a>.</p>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
{% endblock blog %}
