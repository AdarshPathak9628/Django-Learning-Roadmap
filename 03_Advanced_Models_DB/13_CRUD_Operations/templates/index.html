<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project 13: Django CRUD</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f4f7f6;
      }
      .card {
        border: none;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      .btn-register {
        background-color: #007bff;
        border: none;
      }
    </style>
  </head>
  <body>
    <div class="container mt-5">
      <h2 class="text-center mb-5 text-dark">
        Student Management System (CRUD)
      </h2>

      <div class="row">
        <div class="col-md-4">
          <div class="card p-4">
            <h4 class="mb-3 text-primary">Add Student</h4>
            <form action="" method="POST">
              {% csrf_token %}
              <div class="mb-3">{{ form.as_p }}</div>
              <button type="submit" class="btn btn-primary w-100 btn-register">
                Save Record
              </button>
            </form>
          </div>
        </div>

        <div class="col-md-8">
          <div class="card p-4">
            <h4 class="mb-3 text-success">Student Records</h4>
            <table class="table table-hover">
              <thead class="table-dark">
                <tr>
                  <th>ID</th>
                  <th>Name</th>
                  <th>Email</th>
                  <th class="text-center">Actions</th>
                </tr>
              </thead>
              <tbody>
                {% for s in students %}
                <tr>
                  <td>{{ s.id }}</td>
                  <td>{{ s.name }}</td>
                  <td>{{ s.email }}</td>
                  <td class="text-center">
                    <a
                      href="{% url 'updatedata' s.id %}"
                      class="btn btn-warning btn-sm px-3"
                      >Edit</a
                    >

                    <form
                      action="{% url 'deletedata' s.id %}"
                      method="post"
                      class="d-inline"
                    >
                      {% csrf_token %}
                      <input
                        type="submit"
                        class="btn btn-danger btn-sm px-3"
                        value="Delete"
                      />
                    </form>
                  </td>
                </tr>
                {% empty %}
                <tr>
                  <td colspan="4" class="text-center text-muted">
                    No records found. Please add a student.
                  </td>
                </tr>
                {% endfor %}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
