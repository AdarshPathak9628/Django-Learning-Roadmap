<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard | Project 16</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f8f9fa;
      }
      .profile-card {
        margin-top: 100px;
        border-radius: 15px;
        border: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6 text-center">
          <div class="card shadow profile-card p-5">
            <h1 class="display-4 text-primary">Success!</h1>
            <hr />
            <h3>
              Welcome,
              <span class="text-success">{{ request.user.username }}</span>!
            </h3>
            <p class="text-muted">
              You have successfully used Django's Built-in Authentication
              system.
            </p>

            <div class="mt-4">
              <a href="{% url 'logout' %}" class="btn btn-outline-danger px-5"
                >Logout</a
              >
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
