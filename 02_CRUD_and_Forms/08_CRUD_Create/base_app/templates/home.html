<!doctype html>
<html>
  <head>
    <title>Project 08 | Create Student</title>
  </head>
  <body style="text-align: center; font-family: Arial">
    <h2>Add New Student</h2>

    <form
      method="POST"
      style="display: inline-block; border: 1px solid #ccc; padding: 20px"
    >
      {% csrf_token %}
      <input
        type="text"
        name="s_name"
        placeholder="Enter Name"
        required
      /><br /><br />
      <input
        type="number"
        name="s_roll"
        placeholder="Enter Roll No"
        required
      /><br /><br />
      <input
        type="email"
        name="s_email"
        placeholder="Enter Email"
        required
      /><br /><br />

      <button type="submit">Save Student</button>
    </form>

    <hr />
    <h3>All Students:</h3>
    <ul>
      {% for s in students %}
      <li>{{ s.name }} - {{ s.roll_no }}</li>
      {% endfor %}
    </ul>
  </body>
</html>
