<!doctype html>
<html>
  <head>
    <title>Project 07 | Student List</title>
    <style>
      table {
        width: 50%;
        border-collapse: collapse;
        margin: 20px auto;
        font-family: Arial;
      }
      th,
      td {
        border: 1px solid #dddddd;
        padding: 8px;
        text-align: center;
      }
      th {
        background-color: #f2f2f2;
      }
      h2 {
        text-align: center;
        color: #333;
      }
    </style>
  </head>
  <body>
    <h2>Registered Students List</h2>

    <table>
      <tr>
        <th>Name</th>
        <th>Roll No</th>
        <th>Email</th>
      </tr>
      {% for s in students %}
      <tr>
        <td>{{ s.name }}</td>
        <td>{{ s.roll_no }}</td>
        <td>{{ s.email }}</td>
      </tr>
      {% endfor %}
    </table>
  </body>
</html>
