{% extends "index.html" %} {% load static %} {% block blog %}
<header id="home">
  <div
    id="carouselExampleCaptions"
    class="carousel slide"
    data-bs-ride="carousel"
  >
    <div class="carousel-indicators">
      <button
        type="button"
        data-bs-target="#carouselExampleCaptions"
        data-bs-slide-to="0"
        class="active"
      ></button>
      <button
        type="button"
        data-bs-target="#carouselExampleCaptions"
        data-bs-slide-to="1"
      ></button>
      <button
        type="button"
        data-bs-target="#carouselExampleCaptions"
        data-bs-slide-to="2"
      ></button>
    </div>

    <div class="carousel-inner">
      <div class="carousel-item active">
        <img
          src="{% static 'img/banner.jpg' %}"
          class="d-block w-100"
          alt="Slide 1"
        />
        <div class="carousel-caption d-md-block">
          <h5>Quality Development</h5>
          <p>Building professional web applications with Django.</p>
        </div>
      </div>
      <div class="carousel-item">
        <img
          src="{% static 'img/banner1.jpg' %}"
          class="d-block w-100"
          alt="Slide 2"
        />
        <div class="carousel-caption d-md-block">
          <h5>Fast & Secure</h5>
          <p>Scalable back-end solutions using Python.</p>
        </div>
      </div>
    </div>

    <button
      class="carousel-control-prev"
      type="button"
      data-bs-target="#carouselExampleCaptions"
      data-bs-slide="prev"
    >
      <span class="carousel-control-prev-icon"></span>
      <span class="visually-hidden">Previous</span>
    </button>
    <button
      class="carousel-control-next"
      type="button"
      data-bs-target="#carouselExampleCaptions"
      data-bs-slide="next"
    >
      <span class="carousel-control-next-icon"></span>
      <span class="visually-hidden">Next</span>
    </button>
  </div>
</header>
{% endblock blog %}
