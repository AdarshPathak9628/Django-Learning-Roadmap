{% extends "index.html" %} {% load static %} {% block blog %}
<section class="contact py-5" id="contact">
  <div class="container">
    <div class="text-center my-5">
      <h1>Feel Free <span class="text-primary">to connect</span></h1>
      <hr class="w-25 m-auto" />
    </div>
    <div class="row">
      <div class="col-md-6 col-12" data-aos="fade-up">
        <form class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Email</label
            ><input type="email" class="form-control" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Password</label
            ><input type="password" class="form-control" />
          </div>
          <div class="col-12">
            <button type="submit" class="btn btn-primary">Send Message</button>
          </div>
        </form>
      </div>
      <div class="col-md-6 col-12 text-end">
        <img
          src="{% static 'img/adarsh.jpg' %}"
          class="img-fluid img-thumbnail adarsh"
          alt="Contact Image"
        />
      </div>
    </div>
  </div>
</section>

<div
  class="container-fluid bg-primary text-white p-2 text-center fs-5 fixed-bottom"
>
  Developed by Adarsh Pathak
</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
  AOS.init();
</script>
{% endblock blog %}
